const SK="bubik-log-v2",CHK="bubik-chk-v2";
function loadLog(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch{return{}}}
function saveLog(l){try{localStorage.setItem(SK,JSON.stringify(l))}catch{}}
function loadChecks(){try{return JSON.parse(localStorage.getItem(CHK))||{}}catch{return{}}}
function saveChecks(c){try{localStorage.setItem(CHK,JSON.stringify(c))}catch{}}
function todayStr(){return new Date().toISOString().split("T")[0]}
function fmtTime(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,"0")}
function round25(v){return Math.round(v/2.5)*2.5}
function exType(ex){return ex.type||"weighted"}
function isLogged(entry){return entry&&entry.set1&&entry.set2}
function getHistory(dayId,exId,max){const log=loadLog(),r=[],sfx="_"+dayId+"_"+exId;Object.keys(log).filter(k=>k.endsWith(sfx)).sort().reverse().forEach(k=>{if(r.length<(max||6))r.push({date:k.split("_")[0],...log[k]})});return r}
function getLastSession(dayId,exId){const log=loadLog(),tk=todayStr(),sfx="_"+dayId+"_"+exId;const k=Object.keys(log).filter(k=>k.endsWith(sfx)&&!k.startsWith(tk)).sort().reverse()[0];return k?{date:k.split("_")[0],...log[k]}:null}
function checkOverload(dayId,exId,repMax){if(!repMax)return false;const hi=getHistory(dayId,exId,3).filter(x=>x.date!==todayStr());if(hi.length<2||hi[0].reps<repMax[1]||hi[1].reps<repMax[1])return false;if(hi[0].weight!==hi[1].weight)return false;const tk=todayStr(),log=loadLog(),ck=tk+"_"+dayId+"_"+exId,te=log[ck];if(te&&te.weight>0&&te.weight>hi[0].weight)return false;return true}
function playBeep(){try{const ac=new(window.AudioContext||window.webkitAudioContext)();const beeps=[[880,150],[0,80],[880,150],[0,80],[1100,200]];let t=ac.currentTime;beeps.forEach(([freq,dur])=>{if(freq>0){const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=freq;o.type="square";g.gain.value=0.3;o.start(t);o.stop(t+dur/1000)}t+=dur/1000});setTimeout(()=>ac.close(),1500)}catch{}}
let wl=null;async function reqWL(){try{if("wakeLock"in navigator)wl=await navigator.wakeLock.request("screen")}catch{}}function relWL(){try{wl&&wl.release();wl=null}catch{}}

function MiniTimer({seconds,sides,color,onDone}){
  const c=CL[color];const twoPhase=sides===2;const[phase,setPhase]=useState(0);const[rem,setRem]=useState(seconds);const iv=useRef(null);
  const vib=p=>{try{navigator.vibrate(p)}catch{};playBeep()};
  useEffect(()=>{if((phase===1||phase===3)&&rem>0){iv.current=setInterval(()=>setRem(p=>{if(p<=1){clearInterval(iv.current);vib([200,100,200]);if(phase===1&&twoPhase){setPhase(2);return 0}setPhase(4);if(onDone)onDone();return 0}return p-1}),1000)}return()=>clearInterval(iv.current)},[phase,rem]);
  const start=()=>{setRem(seconds);setPhase(1)};const startS2=()=>{setRem(seconds);setPhase(3)};
  if(phase===0)return h("button",{onClick:start,style:{background:c.bg,border:"1px solid "+c.d,borderRadius:6,color:c.a,padding:"4px 10px",fontSize:11,fontWeight:800,marginTop:4}},"\u23F1 "+fmtTime(seconds)+(twoPhase?" (each)":""));
  if(phase===2)return h("div",{style:{marginTop:4,padding:"8px 12px",background:"#1a1508",border:"1px solid #D4A04C",borderRadius:8,textAlign:"center",animation:"switchPulse 1.5s infinite"}},h("div",{style:{fontSize:14,fontWeight:900,color:"#D4A04C"}},"\u21C4 SWITCH SIDES"),h("button",{onClick:startS2,style:{marginTop:6,background:"#D4A04C",borderRadius:6,color:"#000",padding:"6px 20px",fontSize:13,fontWeight:800}},"Start side 2"));
  if(phase===4)return h("div",{onClick:()=>{setPhase(0);setRem(seconds)},style:{marginTop:4,fontSize:12,color:c.a,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:6}},"\u2714 Done"+(twoPhase?" (both sides)":""),h("span",{style:{fontSize:10,color:"#555",fontWeight:600}},"\u21BB"));
  return h("div",{style:{marginTop:4,display:"flex",alignItems:"center",gap:8}},
    h("span",{style:{fontSize:16,fontWeight:900,color:rem<=5?"#D4727A":"#F0F0F0",fontVariantNumeric:"tabular-nums",animation:rem<=5?"timerPulse 1s infinite":"none",minWidth:40}},fmtTime(rem)),
    twoPhase&&h("span",{style:{fontSize:10,color:"#777",fontWeight:700}},phase===1?"Side 1":"Side 2"),
    h("button",{onClick:()=>{clearInterval(iv.current);if(phase===1&&twoPhase){setPhase(2);setRem(0)}else{setPhase(4);if(onDone)onDone()}},style:{background:"#222",border:"1px solid #333",borderRadius:6,color:"#888",padding:"3px 10px",fontSize:11,fontWeight:700}},"Skip"));
}

function ExerciseTimer({target,color,onComplete,sides}){
  const twoSide=sides===2;
  const[total,setTotal]=useState(0);const[run,setRun]=useState(false);const[done,setDone]=useState(false);const[beeped,setBeeped]=useState(false);
  const[side,setSide]=useState(1);const[switching,setSwitching]=useState(false);const[s1Time,setS1Time]=useState(0);
  const iv=useRef(null);const c=CL[color];
  const rem=Math.max(0,target-total);const over=total>target;const overBy=total-target;
  useEffect(()=>{if(run){iv.current=setInterval(()=>setTotal(p=>{const nxt=p+1;if(nxt===target&&!beeped){playBeep();try{navigator.vibrate([300,150,300,150,300])}catch{};setBeeped(true)}return nxt}),1000)}return()=>clearInterval(iv.current)},[run,beeped]);
  const stop=()=>{clearInterval(iv.current);setRun(false);
    if(twoSide&&side===1){setS1Time(total);setSwitching(true)}
    else setDone(true)};
  const startSide2=()=>{setSwitching(false);setSide(2);setTotal(0);setBeeped(false);setRun(true)};
  const start=()=>{setTotal(0);setDone(false);setBeeped(false);setSide(1);setS1Time(0);setSwitching(false);setRun(true)};
  const save=()=>{if(onComplete){if(twoSide)onComplete({duration_s1:s1Time,duration_s2:total});else onComplete(total)}};
  if(switching)return h("div",{style:{textAlign:"center",padding:"12px 0",animation:"switchPulse 1.5s infinite"}},
    h("div",{style:{fontSize:14,fontWeight:900,color:"#F39C12",letterSpacing:2}},"\u21C4 SWITCH SIDES"),

function WorkoutView({day,onLogUpdate}){
  const c=CL[day.color],tk=todayStr(),log=loadLog();
  const done=day.ex.filter(x=>{const en=log[tk+"_"+day.id+"_"+x.id];return isLogged(en)}).length;
  const allDone=done===day.ex.length&&day.ex.length>0;
  const[cv,setCv]=useState(0);const chks=loadChecks(),chkK=tk+"_"+day.id;
  const wC=chks[chkK+"_w"]||day.warmup.map(()=>false);
  const cC=chks[chkK+"_c"]||day.cool.map(()=>false);
  const tog=(p,i)=>{const ch=loadChecks();const k=chkK+"_"+p;const a=[...(ch[k]||(p==="w"?day.warmup:day.cool).map(()=>false))];a[i]=!a[i];ch[k]=a;saveChecks(ch);setCv(v=>v+1)};
  return h("div",{style:{animation:"slideUp .15s ease"}},
    h("div",{style:{background:c.g,borderRadius:14,padding:"18px",marginTop:16,marginBottom:16}},
      h("div",{style:{fontSize:10,fontWeight:800,color:"rgba(255,255,255,.45)",letterSpacing:3}},"DAY "+day.num),
      h("div",{style:{fontSize:22,fontWeight:900,color:"#fff",marginTop:2}},day.title),
      h("div",{style:{fontSize:12,color:"rgba(255,255,255,.55)",marginTop:2}},day.sub)),
    day.alert&&h("div",{style:{background:"#1A0D10",borderLeft:"4px solid #D4727A",borderRadius:10,padding:"10px 14px",marginBottom:16}},h("div",{style:{fontSize:13,color:"#8B3A4A",fontWeight:700}},day.alert)),
    h(Phase,{title:"WARM-UP",color:day.color}),
    h("div",{style:{marginBottom:16}},day.warmup.map((w,i)=>h(CheckItem,{key:i,item:w,checked:wC[i],onToggle:()=>tog("w",i),color:day.color}))),
    h(Phase,{title:"WORKING SETS",color:day.color}),
    day.ex.map(x=>h(ExCard,{key:x.id,ex:x,color:day.color,dayId:day.id,onLogUpdate})),
    allDone&&h(SessionSummary,{day,color:day.color}),
    h(Phase,{title:"COOL-DOWN",color:day.color}),
    h("div",{style:{marginBottom:24}},day.cool.map((w,i)=>h(CheckItem,{key:i,item:w,checked:cC[i],onToggle:()=>tog("c",i),color:day.color}))));
}

      view==="workout"&&h("div",{style:{marginTop:12,marginBottom:4}},

        h("div",{style:{height:3,background:"#1a1a1a",borderRadius:2}},h("div",{style:{height:"100%",borderRadius:2,background:pct>=100?"#2ECC71":c.a,width:pct+"%",transition:"width .4s",boxShadow:pct>0?"0 0 8px "+(pct>=100?"rgba(46,204,113,.5)":c.gl):"none"}}))),

            h("div",{style:{fontSize:10,fontWeight:800,letterSpacing:2,color:act?dc.a:"#555"}},"DAY "+d.num),
            h("div",{style:{fontSize:10,fontWeight:700,color:act?"#999":"#555",marginTop:1}},d.title.split("&")[0].trim()))}))),
    h("div",{style:{padding:"0 16px"}},view==="info"?h(InfoView):h(WorkoutView,{day,onLogUpdate:onLU})));
}
